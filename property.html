<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Details</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <main class="property-page">

    <a href="/" class="back-link">← Back to properties</a>

    <section class="property-hero">
      <img id="heroImage" src="images/property-1.jpg" alt="">
    </section>

    <section class="property-header">
      <p id="location"></p>
      <h1 id="title">Loading...</h1>
      <h2 id="price"></h2>

      <div class="property-actions">
        <a id="whatsappBtn" class="card-btn">WhatsApp</a>
        <a id="emailBtn" class="card-btn secondary-card-btn">Request details</a>
      </div>

      <div id="meta" class="property-meta-box"></div>
    </section>

    <section class="property-section">
      <h2>About this project</h2>
      <p id="description"></p>
    </section>

    <section class="property-section">
      <h2>Gallery</h2>
      <div id="gallery" class="property-gallery"></div>
    </section>

  </main>

  <script src="/property-details.js"></script>

</body>

</html>
